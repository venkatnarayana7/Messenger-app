<script>
        const slider = document.getElementById('quality-slider');
        const qualityVal = document.getElementById('quality-value');
        const estimatedSize = document.getElementById('estimated-size');
        const savingPercent = document.getElementById('saving-percent');
        const compareBtn = document.getElementById('compare-btn');
        const compareOverlay = document.getElementById('compare-overlay');

        // Quality Slider Logic
        slider.addEventListener('input', (e) => {
            const val = e.target.value;
            qualityVal.textContent = val + '%';
            
            // Simple visual simulation of file size calculation
            const baseSize = 4200; // 4.2 MB in KB
            const ratio = (val / 100) * 0.9 + 0.1; // scale quality to size
            const est = Math.round(baseSize * (val / 100) * (val / 100)); // quadratic for more realistic drop
            
            estimatedSize.textContent = est > 1024 ? (est/1024).toFixed(1) + ' MB' : est + ' KB';
            savingPercent.textContent = (100 - (est/baseSize*100)).toFixed(0) + '%';
        });

        // Compare Toggle Logic
        let isComparing = false;
        compareBtn.addEventListener('click', () => {
            isComparing = !isComparing;
            if (isComparing) {
                compareOverlay.classList.remove('hidden');
                setTimeout(() => {
                    compareOverlay.style.width = '50%';
                }, 10);
                compareBtn.classList.add('bg-primary', 'text-white');
                compareBtn.classList.remove('bg-surface/90', 'text-primary');
            } else {
                compareOverlay.style.width = '0%';
                setTimeout(() => {
                    compareOverlay.classList.add('hidden');
                }, 300);
                compareBtn.classList.remove('bg-primary', 'text-white');
                compareBtn.classList.add('bg-surface/90', 'text-primary');
            }
        });

        // Slider side-by-side drag simulation on preview viewport
        const viewport = document.getElementById('preview-viewport');
        viewport.addEventListener('mousemove', (e) => {
            if (isComparing) {
                const rect = viewport.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const widthPercent = (x / rect.width) * 100;
                compareOverlay.style.width = widthPercent + '%';
            }
        });

        viewport.addEventListener('touchmove', (e) => {
            if (isComparing) {
                const rect = viewport.getBoundingClientRect();
                const x = e.touches[0].clientX - rect.left;
                const widthPercent = (x / rect.width) * 100;
                compareOverlay.style.width = widthPercent + '%';
            }
        });
    </script>
