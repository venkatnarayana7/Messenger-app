<body class="bg-background text-on-surface min-h-screen pb-24">
<!-- Top App Bar -->
<header class="sticky top-0 w-full bg-surface/80 dark:bg-surface-dim/80 backdrop-blur-xl shadow-sm z-50 flex justify-between items-center px-margin-mobile h-16">
<div class="flex items-center gap-4">

</div>
<button class="hover:bg-surface-variant/50 transition-colors active:scale-95 p-2 rounded-full">
<span class="material-symbols-outlined text-primary">more_vert</span>
</button>
</header>
<main class="px-margin-mobile pt-lg space-y-lg">

<div class="absolute inset-0 flex flex-col items-center justify-center space-y-2">
<div class="bg-primary/10 p-4 rounded-full">
<span class="material-symbols-outlined text-primary text-3xl">cloud_upload</span>
</div>
<p class="font-label-lg text-label-lg text-on-surface-variant">Tap to change image</p>
<p class="font-label-sm text-label-sm text-outline">Current: landscape_photo.jpg (2.4 MB)</p>
</div>
</div>
</div>
</section>
<!-- Resize Form -->
<section class="space-y-md">
<div class="flex items-center justify-between">
<h2 class="font-headline-md text-headline-md text-on-surface">Dimensions</h2>
<div class="flex items-center gap-2 bg-surface-container-low px-3 py-1.5 rounded-full">
<span class="font-label-sm text-label-sm text-on-surface-variant">Lock Aspect Ratio</span>
<button class="w-10 h-6 bg-primary rounded-full relative transition-colors duration-200" id="aspectToggle">
<div class="absolute right-1 top-1 w-4 h-4 bg-white rounded-full shadow-sm"></div>
</button>
</div>
</div>
<div class="grid grid-cols-2 gap-md">
<div class="space-y-xs">
<label class="font-label-sm text-label-sm text-outline ml-2">Width (px)</label>
<input class="w-full h-14 bg-surface-container-low border-outline-variant border rounded-xl px-4 focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all font-body-md text-body-md" type="number" value="1920"/>
</div>
<div class="space-y-xs">
<label class="font-label-sm text-label-sm text-outline ml-2">Height (px)</label>
<input class="w-full h-14 bg-surface-container-low border-outline-variant border rounded-xl px-4 focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all font-body-md text-body-md" type="number" value="1080"/>
</div>
</div>
</section>
<!-- Percentage Slider -->

</div>
<input class="w-full h-2 bg-outline-variant rounded-lg appearance-none cursor-pointer custom-slider" max="100" min="0" oninput="document.getElementById('pctValue').innerText = this.value + '%'" type="range" value="100"/>
<div class="flex justify-between text-outline font-label-sm text-label-sm px-1">

<span>50%</span>

<!-- Footer Notice -->
<footer class="flex items-center justify-center gap-2 text-outline py-md">
<span class="material-symbols-outlined text-[18px]">verified_user</span>
<p class="font-label-sm text-label-sm">No watermarks will be added.</p>
</footer>

<span class="material-symbols-outlined">home</span>

<span class="font-label-sm text-label-sm">Tools</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-1 hover:bg-surface-container-low transition-all active:scale-90" href="#">
<span class="material-symbols-outlined">history</span>
<span class="font-label-sm text-label-sm">History</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-1 hover:bg-surface-container-low transition-all active:scale-90" href="#">
<span class="material-symbols-outlined">workspace_premium</span>
<span class="font-label-sm text-label-sm">Premium</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-1 hover:bg-surface-container-low transition-all active:scale-90" href="#">
<span class="material-symbols-outlined">settings</span>
<span class="font-label-sm text-label-sm">Settings</span>
</a>
</nav>
<script>
        // Simple micro-interaction for toggle
        const aspectToggle = document.getElementById('aspectToggle');
        let isLocked = true;
        aspectToggle.addEventListener('click', () => {
            isLocked = !isLocked;
            const knob = aspectToggle.querySelector('div');
            if (isLocked) {
                aspectToggle.classList.replace('bg-outline-variant', 'bg-primary');
                knob.classList.replace('left-1', 'right-1');
            } else {
                aspectToggle.classList.replace('bg-primary', 'bg-outline-variant');
                knob.classList.replace('right-1', 'left-1');
            }
        });

        // Add ripple-like effect on buttons
        const buttons = document.querySelectorAll('button');
        buttons.forEach(btn => {
            btn.addEventListener('mousedown', function(e) {
                this.classList.add('scale-95');
            });
            btn.addEventListener('mouseup', function(e) {
                this.classList.remove('scale-95');
            });
            btn.addEventListener('mouseleave', function(e) {
                this.classList.remove('scale-95');
            });
        });
    </script>
