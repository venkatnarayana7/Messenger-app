<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>PixelFlow - Splash Screen</title>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "outline-variant": "#becabf",

                      "on-primary-fixed": "#002110",
                      "on-secondary-container": "#007239",
                      "secondary": "#006d37",
                      "secondary-fixed-dim": "#61de8a",
                      "surface-container-highest": "#e2e2e2",
                      "on-background": "#1a1c1c",
                      "on-secondary-fixed": "#00210c",
                      "on-tertiary-fixed-variant": "#374b41",
                      "surface-container-lowest": "#ffffff",
                      "surface-container": "#eeeeee",
                      "tertiary-container": "#abc2b4",
                      "inverse-on-surface": "#f0f1f1",
                      "surface-variant": "#e2e2e2",
                      "on-error-container": "#93000a",
                      "surface-container-low": "#f3f3f4",
                      "on-tertiary-fixed": "#0b1f16",
                      "secondary-fixed": "#7efba4",
                      "on-tertiary": "#ffffff",
                      "inverse-surface": "#2f3131",
                      "primary-fixed-dim": "#7adaa1",
                      "on-primary": "#ffffff",
                      "background": "#f9f9f9",
                      "on-secondary": "#ffffff",
                      "error-container": "#ffdad6",
                      "on-primary-fixed-variant": "#005230",
                      "primary-container": "#6fcf97",
                      "tertiary": "#4e6358",
                      "surface-dim": "#dadada",
                      "outline": "#6e7a70",
                      "surface-bright": "#f9f9f9",
                      "on-error": "#ffffff",
                      "primary": "#006d41",
                      "error": "#ba1a1a",
                      "primary-fixed": "#95f7bb",
                      "tertiary-fixed": "#d0e8d9",
                      "on-primary-container": "#005733",
                      "on-surface-variant": "#3e4941",
                      "tertiary-fixed-dim": "#b5ccbe",
                      "on-surface": "#1a1c1c",
                      "surface-tint": "#006d41",
                      "on-tertiary-container": "#3b5045"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "gutter": "16px",
                      "xl": "32px",
                      "base": "4px",
                      "xs": "4px",
                      "sm": "8px",
                      "md": "16px",
                      "lg": "24px",
                      "margin-tablet": "32px",
                      "margin-mobile": "20px"
              },
              "fontFamily": {
                      "label-lg": ["Manrope"],
                      "body-md": ["Manrope"],
                      "headline-lg-mobile": ["Manrope"],

            },
          },
        }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .animate-float {
            animation: float 4s ease-in-out infinite;
        }

        .gradient-text {
            background: linear-gradient(135deg, #006d41 0%, #6fcf97 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .gradient-bg {
            background: linear-gradient(135deg, #006d41 0%, #6fcf97 100%);
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        /* Hide Scrollbar */
        ::-webkit-scrollbar { display: none; }
        body { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body-md selection:bg-primary-container selection:text-on-primary-container">
<!-- Splash Screen Layout -->
<main class="relative h-screen w-full flex flex-col items-center justify-center overflow-hidden">
<!-- Atmospheric Background Elements -->
<div class="absolute inset-0 pointer-events-none overflow-hidden">
<div class="absolute -top-24 -left-24 w-96 h-96 bg-primary-container/20 rounded-full blur-[100px]"></div>
<div class="absolute -bottom-24 -right-24 w-96 h-96 bg-secondary-container/20 rounded-full blur-[100px]"></div>
</div>
<!-- Center Content -->
<div class="relative z-10 flex flex-col items-center justify-center opacity-0 transition-all duration-1000 translate-y-4" id="content-container">
<!-- Premium Logo Container -->
<div class="mb-lg animate-float">
<div class="relative w-24 h-24 flex items-center justify-center">
<!-- Outer Halo -->
<div class="absolute inset-0 gradient-bg rounded-[32px] rotate-12 opacity-10 blur-xl"></div>
<!-- Logo Shape -->
<div class="relative w-20 h-20 gradient-bg rounded-[24px] flex items-center justify-center shadow-2xl">
<span class="material-symbols-outlined text-surface text-5xl" style="font-variation-settings: 'FILL' 1;">
                            auto_awesome
                        </span>
</div>
<!-- Floating Accent -->
<div class="absolute -top-2 -right-2 w-8 h-8 bg-surface rounded-full shadow-lg flex items-center justify-center border border-outline-variant/30">
<span class="material-symbols-outlined text-primary text-lg" style="font-variation-settings: 'FILL' 1;">
                            flare
                        </span>
</div>
</div>
</div>
<!-- Brand Identity -->
<div class="text-center">
<h1 class="font-display-lg text-display-lg tracking-tighter mb-xs text-on-surface">
                    PixelFlow
                </h1>
<div class="flex items-center justify-center space-x-sm">
<span class="font-label-lg text-label-lg text-on-surface-variant/70 uppercase tracking-widest">
                        Fast
                    </span>
<span class="w-1 h-1 bg-outline rounded-full"></span>
<span class="font-label-lg text-label-lg text-on-surface-variant/70 uppercase tracking-widest">
                        Private
                    </span>
<span class="w-1 h-1 bg-outline rounded-full"></span>
<span class="font-label-lg text-label-lg text-on-surface-variant/70 uppercase tracking-widest">
                        No Watermarks
                    </span>
</div>
</div>
</div>
<!-- Bottom Loading Indicator (Subtle) -->
<div class="absolute bottom-xl w-full flex flex-col items-center">
<div class="w-12 h-1 bg-surface-container rounded-full overflow-hidden mb-sm">
<div class="h-full gradient-bg w-0 rounded-full transition-all duration-[3000ms] ease-out" id="loading-bar"></div>
</div>
<p class="font-label-sm text-label-sm text-on-surface-variant/40">Secure Connection Established</p>
</div>
</main>
<!-- Micro-interaction Script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('content-container');
            const loadingBar = document.getElementById('loading-bar');
            
            // Entry animation
            setTimeout(() => {
                container.classList.remove('opacity-0', 'translate-y-4');
                container.classList.add('opacity-100', 'translate-y-0');
            }, 300);

            // Fake loading progress
            setTimeout(() => {
                loadingBar.style.width = '100%';
            }, 100);

            // Optional: Auto-transition logic could go here
        });
    </script>
</body></html>
