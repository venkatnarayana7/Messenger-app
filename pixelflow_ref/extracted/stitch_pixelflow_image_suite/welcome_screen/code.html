<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
        }
        body {
            background-color: #ffffff;
            color: #1a1c1c;
            font-family: 'Manrope', sans-serif;
            overflow-x: hidden;
        }
        .glass-header {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .image-card-float {
            animation: floating 6s ease-in-out infinite;
        }
        @keyframes floating {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(2deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }
        .check-gradient {
            background: linear-gradient(135deg, #6fcf97 0%, #006d41 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface-container-lowest min-h-screen flex flex-col">
<!-- Top Navigation Shell (Limited for Onboarding) -->
<header class="sticky top-0 w-full z-50 bg-surface/80 backdrop-blur-xl flex justify-between items-center px-margin-mobile h-16 shadow-sm">
<div class="font-headline-md text-headline-md font-bold text-primary">PixelFlow</div>
<button class="p-2 rounded-full hover:bg-surface-variant/50 transition-colors active:scale-95 duration-100">
<span class="material-symbols-outlined text-on-surface-variant">more_vert</span>
</button>
</header>
<main class="flex-grow flex flex-col px-margin-mobile pb-xl">
<!-- Hero Illustration Section -->
<section class="relative w-full h-[320px] mt-8 flex items-center justify-center overflow-hidden">
<!-- Background Decorative Elements -->
<div class="absolute w-64 h-64 bg-secondary-container/20 rounded-full blur-3xl -top-10 -left-10"></div>
<div class="absolute w-48 h-48 bg-primary-container/10 rounded-full blur-3xl bottom-0 -right-5"></div>
<!-- Floating Image Cards (Modern Minimalist Illustration) -->
<div class="relative w-full max-w-[280px] h-full">
<!-- Bottom Card -->
<div class="absolute bottom-10 left-0 w-44 h-56 bg-white rounded-xl shadow-[0px_8px_24px_rgba(0,0,0,0.04)] p-2 rotate-[-6deg] image-card-float" style="animation-delay: 0.5s;">
<div class="w-full h-full rounded-lg bg-surface-container overflow-hidden relative">
<img class="w-full h-full object-cover grayscale opacity-60" data-alt="A minimalist architectural photograph of a spiral staircase in a white gallery, shot from above to emphasize geometric lines and soft shadows. The overall aesthetic is clean and professional with a bright, high-key lighting style and emerald green accents in the decor." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCdNDPjYN4nOpwzao34KmPnApqEl1yr-TEV1Ev7tqynzO0UE2A3OrjUhqi_7iXdJi8-CrULssmq23kTG2QJvICk4MN9da-yFFJvl0fQz_X8c7_eefAWooZP2bHIQfrXPbLfQ2RRT4ip8vjRCyEJ-0_UgLyctDRHGSZ8hMMPZ-b5dzy6ASS3iG_Lz9hsVmdxiwWLW362kjjCazg-JELOKRug1upDX-e8YfM5dV1dAthZ_-ijRGDXlWBwORXgIyaK1EpKZT_1QvhvhDg"/>
<div class="absolute inset-0 flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-4xl">pending</span>
</div>
</div>
</div>
<!-- Top Card (Processed) -->
<div class="absolute top-10 right-0 w-44 h-56 bg-white rounded-xl shadow-[0px_12px_32px_rgba(0,0,0,0.08)] p-2 rotate-[4deg] image-card-float">
<div class="w-full h-full rounded-lg bg-surface-container overflow-hidden relative">
<img class="w-full h-full object-cover" data-alt="A vibrant, high-contrast close-up of lush tropical leaves with dew drops reflecting light. The image is crisp and professional, showcasing deep greens and emerald tones with a minimalist composition that feels fresh and energetic. The lighting is soft morning sun creating a premium feel." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBWFqCcGXUOpQ1gNfZ0KuY5Vg2f-A_iB7jAytDXDDgYuTqor4VbLD6W8Estfd7N9LuJEfCwHIr0xgHXmBN_D92NxeHjGKiQh370sC5p2hbpPdZZXtD_09M5_jtg7WfqvDLskY0cRkX0-3YsJtjjL3pPfIC7IaIVQil3dxxq6sqkHXWyHnbh12JP4H-kKTF9HdZJi2lrCzzbcjKedqnZG3LRCHnnckAr2jT8QJ02i0UYmapUMpGtTl7Hd196jsxHMFImDzSTcgBKphE"/>
<div class="absolute top-2 right-2 bg-secondary-container rounded-full p-1 shadow-md">
<span class="material-symbols-outlined text-on-secondary-container text-sm" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</div>
</div>
<!-- Processing Line -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full h-[2px] bg-gradient-to-r from-transparent via-primary/30 to-transparent flex justify-center">
<div class="w-2 h-2 bg-primary rounded-full animate-ping"></div>
</div>
</div>
</section>
<!-- Content Section -->
<section class="mt-8 text-center sm:text-left">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-md">
                Your Images.<br/>Your Control.
            </h1>
<p class="font-body-md text-body-md text-on-surface-variant mb-lg max-w-sm">
                Experience high-speed image processing designed for privacy and professional results.
            </p>
<!-- Feature List -->
<ul class="space-y-4 mb-xl max-w-xs mx-auto sm:mx-0">
<li class="flex items-center gap-3">
<div class="w-6 h-6 flex items-center justify-center rounded-full bg-secondary-container/30">
<span class="material-symbols-outlined text-secondary text-base font-bold">check</span>
</div>
<span class="font-label-lg text-label-lg text-on-surface">No Ads</span>
</li>
<li class="flex items-center gap-3">
<div class="w-6 h-6 flex items-center justify-center rounded-full bg-secondary-container/30">
<span class="material-symbols-outlined text-secondary text-base font-bold">check</span>
</div>
<span class="font-label-lg text-label-lg text-on-surface">No Watermarks</span>
</li>
<li class="flex items-center gap-3">
<div class="w-6 h-6 flex items-center justify-center rounded-full bg-secondary-container/30">
<span class="material-symbols-outlined text-secondary text-base font-bold">check</span>
</div>
<span class="font-label-lg text-label-lg text-on-surface">No Login Required</span>
</li>
<li class="flex items-center gap-3">
<div class="w-6 h-6 flex items-center justify-center rounded-full bg-secondary-container/30">
<span class="material-symbols-outlined text-secondary text-base font-bold">check</span>
</div>
<span class="font-label-lg text-label-lg text-on-surface">Fast Processing</span>
</li>
</ul>
</section>
<!-- Action Section -->
<section class="mt-auto flex flex-col gap-4">
<button class="w-full h-14 rounded-full bg-gradient-to-r from-primary-container to-primary text-on-primary font-label-lg text-lg flex items-center justify-center gap-2 shadow-lg shadow-primary/10 active:scale-95 transition-all duration-200" id="continue-btn">
                Continue
                <span class="material-symbols-outlined">arrow_forward</span>
</button>
<button class="w-full h-12 rounded-full bg-transparent text-on-surface-variant font-label-lg text-label-lg hover:bg-surface-container-low transition-colors active:scale-95 duration-200">
                Skip
            </button>
</section>
</main>
<!-- Visual Subtle Noise/Texture Overlay -->
<div class="fixed inset-0 pointer-events-none opacity-[0.03] mix-blend-multiply bg-[url('https://www.transparenttextures.com/patterns/asfalt-light.png')]"></div>
<script>
        // Simple Micro-interaction for the continue button
        const continueBtn = document.getElementById('continue-btn');
        continueBtn.addEventListener('mousedown', () => {
            continueBtn.style.transform = 'scale(0.98)';
        });
        continueBtn.addEventListener('mouseup', () => {
            continueBtn.style.transform = 'scale(1)';
        });
        continueBtn.addEventListener('mouseleave', () => {
            continueBtn.style.transform = 'scale(1)';
        });

        // Add visual interest to the floating cards on scroll
        window.addEventListener('scroll', () => {
            const scrolled = window.scrollY;
            const cards = document.querySelectorAll('.image-card-float');
            cards.forEach((card, index) => {
                const speed = (index + 1) * 0.1;
                card.style.transform = `translateY(${scrolled * speed}px)`;
            });
        });
    </script>
</body></html>
